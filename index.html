<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BloorARTS The Little Mermaid Musical 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --blue: #0033A0; --white: #ffffff; --off-white: #f8f9fc; --border: #d0d8e8; --text: #0a1a3a; }

body { font-family: 'Inter', sans-serif; color: var(--text); background: var(--white); overflow-x: hidden; scroll-behavior: smooth; }

/* NAVIGATION */
nav { position: absolute; top: 0; width: 100%; z-index: 100; display: flex; justify-content: space-between; padding: 2rem 4rem; align-items: center; }
.nav-logo { font-family: 'Libre Baskerville'; font-size: 1.2rem; color: white; text-decoration: none; }
.nav-links { display: flex; gap: 2.5rem; list-style: none; align-items: center; }
.nav-links a { color: white; text-decoration: none; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }

/* HERO SECTION */
.hero { position: relative; height: 100vh; width: 100%; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
#liquid-canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }

.hero-ui { position: absolute; bottom: 12%; z-index: 10; text-align: center; width: 100%; pointer-events: none; }
.hero-btns { display: flex; justify-content: center; gap: 20px; pointer-events: auto; }
.btn { 
    display: inline-block; padding: 1.1rem 2.8rem; font-size: 0.75rem; font-weight: 700; 
    text-transform: uppercase; text-decoration: none; border-radius: 2px; transition: 0.3s;
}
.btn-primary { background: var(--white); color: var(--blue); }
.btn-ghost { border: 1.5px solid var(--white); color: var(--white); }

/* CONTENT SECTIONS */
section { position: relative; z-index: 10; padding: 8rem 5vw; background: white; }
#cast { background: var(--off-white); }

/* TICKETING & CALENDAR */
.ticket-layout { display: grid; grid-template-columns: 320px 1fr; gap: 4rem; margin-top: 3rem; }
.cal-wrap { border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; background: white; }
.cal-grid { width: 100%; border-collapse: collapse; text-align: center; }
.cal-day { width: 40px; height: 40px; border: none; background: none; cursor: pointer; border-radius: 4px; font-size: 0.85rem; }
.cal-day.show-day { color: var(--blue); font-weight: 700; background: #f0f4ff; }
.cal-day.selected { background: var(--blue) !important; color: white !important; }
.slot-card { background: white; border: 1px solid var(--border); padding: 1.5rem; border-radius: 6px; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }

/* CAST GRID SYSTEM */
.cast-component-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 3.5rem 2rem; }
.cast-card-new { display: flex; flex-direction: column; }
.cast-avatar-square { width: 100%; aspect-ratio: 1; border-radius: 12px; background: #eaedf5; border: 1px solid var(--border); overflow: hidden; margin-bottom: 1.2rem; position: relative; }
.cast-avatar-image { width: 100%; height: 100%; object-fit: cover; position: relative; z-index: 2; }
.cast-name-new { font-size: 1.15rem; font-weight: 700; margin-bottom: 0.2rem; }
.cast-role-new { font-size: 0.85rem; font-weight: 500; color: var(--blue); }
.cast-tag-new { font-size: 0.75rem; color: #8e9db0; text-transform: uppercase; letter-spacing: 0.05em; }
</style>
</head>
<body>

<nav>
    <a href="#" class="nav-logo">
    <img src="bloorartslogo.png" alt="BloorARTS" style="height: 60px; width: auto;">
</a>
    <ul class="nav-links">
        <li><a href="https://tdsb.schoolcashonline.com/Fee/Details/432845/153/False/True" target="_blank">Tickets</a></li>
        <li><a href="#cast">The Company</a></li>
        <li><a href="https://tdsb.schoolcashonline.com/Fee/Details/432845/153/False/True" target="_blank" style="background:white; color:var(--blue); padding: 0.6rem 1.2rem; border-radius:2px;">Donate</a></li>
    </ul>
</nav>

<header class="hero">
    <div id="liquid-canvas"></div>
    <div class="hero-ui">
        <div class="hero-btns">
            <a href="https://tdsb.schoolcashonline.com/Fee/Details/432845/153/False/True" target="_blank" class="btn btn-primary">Purchase Tickets</a>
            <a href="#cast" class="btn btn-ghost">The Company</a>
        </div>
    </div>
</header>

<section id="tickets">
    <span style="font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--blue);">Box Office</span>
    <h2 style="font-family:'Libre Baskerville'; font-size: 2.5rem; margin-top: 0.5rem;">Performance Dates</h2>
    <div class="ticket-layout">
        <div class="cal-wrap">
            <table class="cal-grid">
                <thead><tr><th>Su</th><th>Mo</th><th>Tu</th><th>We</th><th>Th</th><th>Fr</th><th>Sa</th></tr></thead>
                <tbody id="cal-body"></tbody>
            </table>
        </div>
        <div id="slots-panel"><div id="slots-content" style="color:#4a5878; padding-top:1rem;">Select a highlighted date to view showtimes.</div></div>
    </div>
</section>

<section id="cast">
    <div style="text-align: center; margin-bottom: 4rem;">
        <span style="font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--blue);">The Company</span>
        <h2 style="font-family:'Libre Baskerville'; font-size: 2.5rem; margin-top: 0.5rem;">Cast List</h2>
    </div>
    <div class="cast-component-grid" id="cast-grid"></div>
</section>

<script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

const TICKET_URL = "https://tdsb.schoolcashonline.com/Fee/Details/432845/153/False/True";

const showData = {
    "2026-04-30": { label: "April 30th", shows: [{ time: "7:00 PM", cast: "Reef" }] },
    "2026-05-01": { label: "May 1st", shows: [{ time: "7:00 PM", cast: "Lagoon" }] },
    "2026-05-02": { label: "May 2nd", shows: [{ time: "2:00 PM", cast: "Reef" }, { time: "7:00 PM", cast: "Lagoon" }] }
};

const castMembers = [
  { role: "Ariel", reef: "Stella Ramsay", reefImg: "stella-ramsay.jpg", lagoon: "Amelia Greenblatt", lagoonImg: "amelia-greenblatt.jpg" },
  { role: "Prince Eric", reef: "Leo Izmaylov", reefImg: "leo-izmaylov.jpg", lagoon: "Corey Ship", lagoonImg: "corey-ship.jpg" },
  { role: "Pilot", reef: "Nate Jeanerette", reefImg: "nate-jeanerette.jpg", lagoon: "Scofield Tsai", lagoonImg: "scofield-tsai.jpg" },
  { role: "Grimsby", reef: "Neil Basak", reefImg: "neil-basak.jpg", lagoon: "Miles Francis-Kwak", lagoonImg: "miles-francis-kwak.jpg" },
  { role: "Flounder", reef: "Devika Nath", reefImg: "devika-nath.jpg", lagoon: "Reena Li", lagoonImg: "reena-li.jpg" },
  { role: "Scuttle", reef: "Izabella Szabados", reefImg: "izabella-szabados.jpg", lagoon: "Hayden Sloan", lagoonImg: "hayden-sloan.jpg" },
  { role: "King Triton", both: "Jack Siegel", img: "jack-siegel.jpg" },
  { role: "Windward", both: "Shua Rocklin", img: "shua-rocklin.jpg" },
  { role: "Sebastian", reef: "Jordan Paul", reefImg: "jordan-paul.jpg", lagoon: "Maria Maameri", lagoonImg: "maria-maameri.jpg" },
  { role: "Aquata / Princess 5", both: "Sara Elhossaini", img: "sara-elhossaini.jpg" },
  { role: "Andrina / Princess 4", both: "Prashasti Narayan", img: "prashasti-narayan.jpg" },
  { role: "Arista / Princess 1", both: "Daisy Mutuku", img: "daisy-mutuku.jpg" },
  { role: "Atina / Princess 6", both: "Mariana Oliveira", img: "mariana-oliveira.jpg" },
  { role: "Adella / Princess 3", both: "Shion Hogg", img: "shion-hogg.jpg" },
  { role: "Allana / Princess 2", both: "Maeve O'Connor", img: "maeve-oconnor.jpg" },
  { role: "Flotsam", both: "Aishani Mullan-Persad", img: "aishani-mullan-persad.jpg" },
  { role: "Jetsam", both: "Alyssa Seuraj", img: "alyssa-seuraj.jpg" },
  { role: "Ursula", reef: "Maisha Huda", reefImg: "maisha-huda.jpg", lagoon: "Maia Iorio", lagoonImg: "maia-iorio.jpg" },
  { role: "Carlotta", both: "Georgia Flynn", img: "georgia-flynn.jpg" },
  { role: "Chef Louis", reef: "Ryan Pereira-Costa", reefImg: "ryan-pereira-costa.jpg", lagoon: "Kio Stocker Witterick", lagoonImg: "kio-stocker-witterick.jpg" },
  { role: "Ensemble", both: "Amelia Oliveira", img: "amelia-oliveira.jpg" },
  { role: "Ensemble", both: "Gus Cooper", img: "gus-cooper.jpg" },
  { role: "Ensemble", both: "Bhor Katarina", img: "bhor-katarina.jpg" },
  { role: "Ensemble", both: "Julia Cholette", img: "julia-cholette.jpg" },
  { role: "Ensemble", both: "Jasper King", img: "jasper-king.jpg" }
];

// --- TEXT TEXTURE ENGINE (STABLE POSITION) ---
function createTextTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 4096; canvas.height = 2048; 
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.fillStyle = 'white'; ctx.textAlign = 'center';
    
    ctx.font = '700 280px "Libre Baskerville"';
    ctx.fillText('THE LITTLE', 2048, 880);
    
    // Stable Baseline (1260) to avoid sub-pixel chippiness
    ctx.font = 'italic 700 480px "Libre Baskerville"';
    ctx.fillText('Mermaid', 2048, 1260);
    
    const tex = new THREE.CanvasTexture(canvas);
    tex.minFilter = THREE.LinearFilter;
    tex.magFilter = THREE.LinearFilter;
    tex.anisotropy = 16; 
    return tex;
}

// --- WEBGL RENDERING ---
const container = document.getElementById('liquid-canvas');
const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio); 
renderer.setSize(window.innerWidth, window.innerHeight);
container.appendChild(renderer.domElement);

const video = document.createElement('video');
video.src = 'hero.mp4'; video.loop = true; video.muted = true; video.playsInline = true;
video.play();

const videoTexture = new THREE.VideoTexture(video);
const textTexture = createTextTexture();
const mouse = new THREE.Vector2(0, 0);

let targetA = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);
let targetB = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);

const simMaterial = new THREE.ShaderMaterial({
    uniforms: { tPrev: { value: targetA.texture }, uMouse: { value: mouse }, uRes: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) } },
    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`,
    fragmentShader: `
        uniform sampler2D tPrev; uniform vec2 uMouse; uniform vec2 uRes; varying vec2 vUv;
        void main() {
            float d = distance(gl_FragCoord.xy, uMouse);
            vec4 prev = texture2D(tPrev, vUv);
            vec4 neighbor = texture2D(tPrev, vUv + vec2(0.002, 0.0)) + texture2D(tPrev, vUv - vec2(0.002, 0.0)) + 
                            texture2D(tPrev, vUv + vec2(0.0, 0.002)) + texture2D(tPrev, vUv - vec2(0.0, 0.002));
            float next = (neighbor.r * 0.5 - prev.g) * 0.98;
            if(d < 25.0) next += 0.45;
            gl_FragColor = vec4(next, prev.r, 0.0, 1.0);
        }`
});

const finalMaterial = new THREE.ShaderMaterial({
    uniforms: { tVideo: { value: videoTexture }, tText: { value: textTexture }, tRipples: { value: targetB.texture } },
    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`,
    fragmentShader: `
        uniform sampler2D tVideo; uniform sampler2D tText; uniform sampler2D tRipples; varying vec2 vUv;
        void main() {
            float ripple = texture2D(tRipples, vUv).r;
            vec2 distortUv = vUv + ripple * 0.03; 
            vec4 vid = texture2D(tVideo, distortUv);
            vec4 txt = texture2D(tText, distortUv);
            gl_FragColor = mix(vid, txt, txt.a);
        }`
});

const simPlane = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), simMaterial);
const finalPlane = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), finalMaterial);

window.addEventListener('mousemove', (e) => {
    if (e.clientY < window.innerHeight) mouse.set(e.clientX, window.innerHeight - e.clientY);
});

function animate() {
    requestAnimationFrame(animate);
    simMaterial.uniforms.tPrev.value = targetA.texture;
    renderer.setRenderTarget(targetB);
    renderer.render(simPlane, camera);
    renderer.setRenderTarget(null);
    renderer.render(finalPlane, camera);
    let temp = targetA; targetA = targetB; targetB = temp;
}
animate();

// --- CALENDAR LOGIC (NEW LABELS) ---
window.selectDate = (dateKey, el) => {
    document.querySelectorAll('.cal-day').forEach(d => d.classList.remove('selected'));
    el.classList.add('selected');
    const panel = document.getElementById('slots-content');
    const data = showData[dateKey];
    let html = `<h3 style="margin-bottom:1.5rem; font-family:'Libre Baskerville'; font-size:1.8rem;">${data.label}</h3>`;
    data.shows.forEach(s => {
        html += `<div class="slot-card"><div><strong>${s.time}</strong><br><small>Cast ${s.cast}</small></div><a href="${TICKET_URL}" target="_blank" class="btn" style="background:var(--blue); color:white; padding:10px 20px; text-decoration:none; border-radius:2px; font-size:0.75rem; font-weight:700;">PURCHASE TICKETS</a></div>`;
    });
    panel.innerHTML = html;
};

function init() {
    const cal = document.getElementById('cal-body');
    const days = [27, 28, 29, 30, 1, 2, 3];
    let row = '<tr>';
    days.forEach(d => {
        const dateKey = d > 20 ? `2026-04-${d}` : `2026-05-0${d}`;
        const isShow = showData[dateKey];
        row += `<td><button class="cal-day ${isShow?'show-day':''}" ${isShow?`onclick="selectDate('${dateKey}', this)"`:''}>${d}</button></td>`;
    });
    cal.innerHTML = row + '</tr>';

    const grid = document.getElementById('cast-grid');
    castMembers.forEach(m => {
        if (m.both) {
            grid.innerHTML += createCard(m.role, m.both, 'Both Casts', m.img);
        } else {
            grid.innerHTML += createCard(m.role, m.reef, 'Cast Reef', m.reefImg);
            grid.innerHTML += createCard(m.role, m.lagoon, 'Cast Lagoon', m.lagoonImg);
        }
    });
}

function createCard(role, name, tag, imgFile) {
    return `<div class="cast-card-new"><div class="cast-avatar-square">${imgFile?`<img src="${imgFile}" class="cast-avatar-image" alt="${name}" onerror="this.style.opacity='0'">`:""}<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:2rem; opacity:0.1; position:absolute; top:0; left:0; z-index:1;">🎭</div></div><div class="cast-name-new">${name}</div><div class="cast-role-new">${role}</div><div class="cast-tag-new">${tag}</div></div>`;
}

init();
</script>
</body>
</html>
